name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-and-api:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --manifest-path crates/Cargo.toml --all -- --check

      - name: Lint
        run: cargo clippy --manifest-path crates/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path crates/Cargo.toml
