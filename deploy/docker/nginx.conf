# Single-container Docker image config. Serves the built web app and proxies
# /api/* to the local Node API. Not intended for direct internet exposure —
# see docs/deployment/REVERSE_PROXY.md for an internet-facing setup.

server {
  listen 3233;
  server_name _;

  root /opt/dockermap/apps/web/dist;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  location /api/events/stream {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Host $host;
    proxy_read_timeout 1h;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    client_max_body_size 32k;
  }

  location = /health {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}
